---
- name: Force IPv4 for apt in VM networks
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/99force-ipv4
    content: |
      Acquire::ForceIPv4 "true";
    mode: "0644"

- name: Install PostgreSQL packages
  ansible.builtin.apt:
    name:
      - postgresql
    state: present
    update_cache: true

- name: Ensure PostgreSQL service is enabled and started
  ansible.builtin.service:
    name: postgresql
    state: started
    enabled: true

- name: Ensure PostgreSQL listens on all interfaces
  ansible.builtin.lineinfile:
    path: /etc/postgresql/16/main/postgresql.conf
    regexp: "^#?listen_addresses\\s*="
    line: "listen_addresses = '*'"
  notify: Restart PostgreSQL

- name: Allow Redmine hosts in pg_hba
  ansible.builtin.blockinfile:
    path: /etc/postgresql/16/main/pg_hba.conf
    marker: "# {mark} ANSIBLE REDMINE ACCESS"
    block: |
      host    all             all             192.168.2.2/32          md5
      host    all             all             192.168.2.3/32          md5
  notify: Restart PostgreSQL

- name: Ensure database user exists
  ansible.builtin.command:
    cmd: sudo -u postgres psql -tAc "SELECT 1 FROM pg_roles WHERE rolname='{{ redmine_db_user }}'"
  register: postgres_user_exists
  changed_when: false

- name: Create database user
  ansible.builtin.command:
    cmd: sudo -u postgres psql -c "CREATE USER {{ redmine_db_user }} WITH PASSWORD '{{ redmine_db_password }}';"
  when: postgres_user_exists.stdout.strip() != "1"

- name: Ensure database exists
  ansible.builtin.command:
    cmd: sudo -u postgres psql -tAc "SELECT 1 FROM pg_database WHERE datname='{{ redmine_db_name }}'"
  register: postgres_db_exists
  changed_when: false

- name: Create Redmine database
  ansible.builtin.command:
    cmd: sudo -u postgres psql -c "CREATE DATABASE {{ redmine_db_name }} OWNER {{ redmine_db_user }};"
  when: postgres_db_exists.stdout.strip() != "1"

- name: Flush handlers to reload config before app deploy
  ansible.builtin.meta: flush_handlers
